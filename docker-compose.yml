version: '3.9'
services:
  sentinel:
    build: .
    ports: ["8080:80"]
    restart: unless-stopped
  sentinel-dev:
    image: node:20-alpine
    working_dir: /app
    volumes: [".:/app","/app/node_modules"]
    ports: ["3000:3000"]
    env_file: .env
    command: sh -c "npm install && npm run dev -- --host"
    profiles: ["dev"]