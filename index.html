async function askClaude(system, user, apiKey) {
  if (!apiKey) return 'Add your Anthropic API key in Settings to enable AI responses.';
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body:JSON.stringify({ model:CLAUDE_MODEL, max_tokens:400, system, messages:[{role:'user',content:user}] })

    const d = await r.json();
    return d.content?.[0]?.text || 'No response.';
  } catch(e) { return 'API call failed - check your key and CORS settings.'; }
