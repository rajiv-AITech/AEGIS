async function ask(sys,usr,key){
  if(!key) return 'Click "API Key" in the header to enable live AI responses.';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:[{role:'user',content:usr}]})
    });
    const d=await r.json();
    return d.content?.[0]?.text||'No response.';
  }catch(err){return 'API error: '+err.message;}
}

    const bgs=['#0d2035','#1a1500','#1a0d0d'];

    const draw=()=>{
      ctx.fillStyle=bgs[idx];ctx.fillRect(0,0,280,158);
      ctx.strokeStyle=col;ctx.lineWidth=1.5;
      var x=40+Math.random()*100,y=30+Math.random()*60,w=60+Math.random()*40,h=50+Math.random()*30;
      ctx.strokeRect(x,y,w,h);ctx.fillStyle=col;ctx.font='9px monospace';ctx.fillText(tags[idx],x,y-4);
      ctx.strokeStyle='rgba(255,255,255,0.04)';
      for(var k=0;k<8;k++) ctx.strokeRect(Math.random()*240,Math.random()*120,20+Math.random()*30,15+Math.random()*25);
    };
    draw();var id=setInterval(draw,900+idx*200);return function(){clearInterval(id);};
  },[idx]);
  return D({background:'var(--bg3)',border:'1px solid '+col+'40',borderRadius:8,overflow:'hidden'},
    e('canvas',{ref,width:280,height:158,style:{width:'100%',display:'block'}}),
    D({padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'},
      S(label,{fontSize:11,color:'var(--t2)'}),
      S(status,{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:4,background:col+'20',color:col})));
}
